<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio Luso Netto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <aside id="sideBar">
        <div id="profileContainer">
            <img id="avatar" src="https://github.com/LusoNetto.png" alt="">
            <div id="infoProfile">
                <p id="name">Luso Netto</p>
                <p id="cargo">Web Developer</p>
            </div>
        </div>
        <div id="contatosContainer">
            <div id="location" class="infosContato">
                <img src="./assets/map-pin.svg" alt="Ponto no mapa">
                <p class="textoContato">Brasil</p>
            </div>
            <div id="job" class="infosContato">
                <img src="./assets/briefcase.svg" alt="Mala de trabalho">
                <p class="textoContato">NewGo Technology</p>
            </div>
            <div id="github" class="infosContato">
                <img src="./assets/github.svg" alt="Silhueta de um gato">
                <p class="textoContato">LusoNetto</p>
            </div>
            <div id="linkedin" class="infosContato">
                <img src="./assets/linkedin.svg" alt="letra 'i' e letra 'n'">
                <p class="textoContato">LusoNetto</p>
            </div>
            <div id="twiter" class="infosContato">
                <img src="./assets/twitter.svg" alt="Silhueta de um passarinho">
                <p class="textoContato">---</p>
            </div>
            <div id="sitePessoal" class="infosContato">
                <img src="./assets/globe.svg" alt="">
                <p class="textoContato">---</p>
            </div>
            <div id="email" class="infosContato">
                <img src="./assets/mail.svg" alt="Silhueta de uma carta">
                <p class="textoContato">luciano.silva137@hotmail.com</p>
            </div>
        </div>
        <div id="tecnologiasContainer">
            <p id="tituloTecnologias">Tecnologias</p>
            <div id="tecnologias">
                <p id="html" class="tecnologia">HTML</p>
                <p id="css" class="tecnologia">CSS</p>
                <p id="javascript" class="tecnologia">JAVASCRIPT</p>
                <P id="git" class="tecnologia">GIT</P>
                <p id="github" class="tecnologia">GITHUB</p>
            </div>
        </div>
        <div id="experienciasContainer">Experiencias
        </div>
        <div id="educacaoContainer">educacao</div>
    </aside>
    <main id="conteudo">
        <div id="myProjects">My projects</div>
        <div id="project">Project</div>
        <div id="recentPosts">Recent Posts</div>
        <div id="post">Post</div>
    </main>
</body>
</html>
